<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DevicePeek — see any site as iPhone or laptop</title>
<meta name="description" content="Preview any website or app in an iPhone and laptop frame, side by side, right in your browser.">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
</head>
<body>
  <header class="bar">
    <div class="logo">
      <svg viewBox="0 0 32 32" fill="none" aria-hidden="true">
        <rect x="2" y="5" width="21" height="15" rx="2.2" stroke="#37d0c0" stroke-width="2"/>
        <rect x="19" y="12" width="11" height="18" rx="2.4" fill="#0b0e14" stroke="#37d0c0" stroke-width="2"/>
        <circle cx="24.5" cy="26.6" r="1.1" fill="#37d0c0"/>
      </svg>
      Device<span>Peek</span>
    </div>

    <div class="sep hide-sm"></div>

    <form class="urlform" id="urlform">
      <span class="pre">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg>
      </span>
      <input id="url" type="text" placeholder="Paste a URL — your site, a Vercel preview, or localhost:3000" spellcheck="false" autocomplete="off">
      <button type="submit">Preview</button>
    </form>

    <div class="toggle" id="view">
      <button data-view="both" class="on" title="Show both">▦ Both</button>
      <button data-view="phone" title="Phone only">▢ Phone</button>
      <button data-view="laptop" title="Laptop only">▭ Laptop</button>
    </div>

    <div class="ctl dev-only">
      <label for="phoneDev">Phone</label>
      <select class="dev" id="phoneDev"></select>
    </div>
    <div class="ctl dev-only">
      <label for="laptopDev">Laptop</label>
      <select class="dev" id="laptopDev"></select>
    </div>

    <button class="icon" id="rotate" title="Rotate phone">⟳</button>
    <button class="icon" id="reload" title="Reload">↻</button>
    <button class="icon" id="stageToggle" title="Toggle backdrop">◐</button>
    <button class="icon" id="openTab" title="Open URL in a new tab">Open ↗</button>
  </header>

  <main class="stage" id="stage">
    <section class="device" id="phoneDevice">
      <div class="scaler" id="phoneScaler">
        <div class="phone" id="phone">
          <span class="pbtn v1"></span><span class="pbtn v2"></span><span class="pbtn pw"></span>
          <div class="pscreen" id="pscreen">
            <div class="island" id="island"></div>
            <iframe id="phoneFrame" title="Phone preview" allow="clipboard-read; clipboard-write; geolocation"></iframe>
          </div>
        </div>
      </div>
      <div class="tag" id="phoneTag">iPhone</div>
    </section>

    <section class="device" id="laptopDevice">
      <div class="scaler" id="laptopScaler">
        <div class="laptop" id="laptop">
          <div class="lid">
            <div class="lscreen" id="lscreen">
              <iframe id="laptopFrame" title="Laptop preview" allow="clipboard-read; clipboard-write; geolocation"></iframe>
            </div>
          </div>
          <div class="base" id="lbase"></div>
        </div>
      </div>
      <div class="tag" id="laptopTag">Laptop</div>
    </section>
  </main>

  <div class="note" id="note">
    <span>Blank frame? That site <b>blocks embedding</b>.</span>
    <a href="#" id="noteOpen">Open it in a new tab ↗</a>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
